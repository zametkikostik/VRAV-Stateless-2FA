name: Build Android APK (VRAV 2FA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Для стабильной сборки откатываемся на Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Ставим стабильный Gradle 8.5 (он идеально совместим с плагинами 8.x)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # Магия: Принудительно меняем экспериментальный плагин 9.1.1 на стабильный 8.2.2 в build.gradle.kts
    # А также вырезаем ломающую debug-подпись AI Studio
    - name: Fix AGP Version and Signing Config Issues
      run: |
        find . -name "build.gradle.kts" -exec sed -i "s/id(\"com.android.application\") version \"9.1.1\"/id(\"com.android.application\") version \"8.2.2\"/g" {} +
        find . -name "build.gradle.kts" -exec sed -i "s/id(\"com.android.library\") version \"9.1.1\"/id(\"com.android.library\") version \"8.2.2\"/g" {} +
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    # Собираем APK напрямую через сгенерированный стабильный бинарник
    - name: Build Debug APK
      run: |
        $GRADLE_HOME/bin/gradle assembleDebug --no-daemon

    - name: Upload Artifact (Get your APK here!)
      uses: actions/upload-artifact@v4
      with:
        name: vrav-2fa-vault-apk
        path: app/build/outputs/apk/debug/app-debug.apk
