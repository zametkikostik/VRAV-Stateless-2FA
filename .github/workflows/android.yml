name: Build Android APK (VRAV 2FA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Нам нужен Java 17 для работы современной сборки Android
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Ставим нужную версию Gradle и генерируем правильный путь к нему
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    # Жестко вырезаем дебаг-подпись AI Studio, которая всё ломает
    - name: Fix AI Studio Signing Config Issue
      run: |
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    # Хак: Собираем проект строго через сгенерированный бинарник Gradle 9.3.1
    - name: Build Debug APK
      run: |
        $GRADLE_HOME/bin/gradle assembleDebug

    - name: Upload Artifact (Get your APK here!)
      uses: actions/upload-artifact@v4
      with:
        name: vrav-2fa-vault-apk
        path: app/build/outputs/apk/debug/app-debug.apk
