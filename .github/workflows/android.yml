name: Build Android APK (VRAV 2FA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Вырезаем ломающую debug-подпись AI Studio из корневого или модульного gradle файла
    - name: Fix AI Studio Signing Config Issue
      run: |
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Artifact (Get your APK here!)
      uses: actions/upload-artifact@v4
      with:
        name: vrav-2fa-vault-apk
        path: app/build/outputs/apk/debug/app-debug.apk
