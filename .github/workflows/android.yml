name: Build and Publish Release APKs

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Накатываем стабильный Gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # Тот самый шаг, где была синтаксическая ошибка. Теперь тут всё четко.
    - name: Bypass Signing and KSP Issues
      run: |
        touch ./my-upload-key.jks
        echo "ksp.incremental=false" >> gradle.properties
        echo "org.gradle.jvmargs=-Djava.awt.headless=true" >> gradle.properties
        find . -name "build.gradle.kts" -exec sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debug")/g' {} +
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    # Запускаем сборку
    - name: Build Debug and Release APKs
      run: |
        $GRADLE_HOME/bin/gradle assemble --no-daemon

    - name: Rename APKs for Release
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/VRAV-2FA-Debug.apk
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/VRAV-2FA-Release.apk || mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/VRAV-2FA-Release.apk

    - name: Upload APKs to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/VRAV-2FA-Debug.apk
          app/build/outputs/apk/release/VRAV-2FA-Release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
