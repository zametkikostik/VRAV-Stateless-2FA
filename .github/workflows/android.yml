name: Build Android APK (VRAV 2FA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Нам нужен Java 17 или выше (Gradle 9 отлично работает на JDK 17/21)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Устанавливаем ту самую ультра-свежую версию Gradle, которую просит плагин от AI Studio
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    # Вырезаем ломающую debug-подпись AI Studio из gradle файлов
    - name: Fix AI Studio Signing Config Issue
      run: |
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    # Собираем APK напрямую через обновленный системный Gradle
    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload Artifact (Get your APK here!)
      uses: actions/upload-artifact@v4
      with:
        name: vrav-2fa-vault-apk
        path: app/build/outputs/apk/debug/app-debug.apk
