name: Build and Publish Release APKs

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Neutralize KSP and Bypass Signing
      run: |
        touch ./my-upload-key.jks
        find . -name "build.gradle.kts" -exec sed -i 's/id("com.google.devtools.ksp")/\/\/ id("com.google.devtools.ksp")/g' {} +
        find . -name "build.gradle.kts" -exec sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debug")/g' {} +
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    - name: Build Debug and Release APKs
      run: |
        $GRADLE_HOME/bin/gradle assemble --no-daemon

    - name: Rename APKs for Release
      run: |
        mkdir -p app/build/outputs/apk/release/
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/VRAV-2FA-Debug.apk
        # Проверяем наличие файла перед переименованием
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/VRAV-2FA-Release.apk
        elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/VRAV-2FA-Release.apk
        fi

    - name: Upload APKs to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        files: |
          app/build/outputs/apk/debug/VRAV-2FA-Debug.apk
          app/build/outputs/apk/release/VRAV-2FA-Release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
