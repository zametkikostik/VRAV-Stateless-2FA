name: Build and Publish Release APKs

on:
  release:
    types: [published] # Скрипт сработает строго в момент публикации релиза

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем гитхабу право прикреплять файлы к релизу

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Fix AI Studio Signing Config Issue
      run: |
        find . -name "build.gradle.kts" -exec sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' {} +

    # Собираем оба APK одновременно
    - name: Build Debug and Release APKs
      run: |
        $GRADLE_HOME/bin/gradle assemble --no-daemon

    # Переименовываем файлы красиво перед публикацией
    - name: Rename APKs for Release
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/VRAV-2FA-Debug.apk
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/VRAV-2FA-Release-Unsigned.apk

    # Самая магия: загружаем файлы прямо в созданный релиз на GitHub
    - name: Upload APKs to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/VRAV-2FA-Debug.apk
          app/build/outputs/apk/release/VRAV-2FA-Release-Unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
